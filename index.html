<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <h1><span class="icon">💰</span> Expense Tracker Pro</h1>
                <button id="toggle" class="theme-toggle">
                    <span class="toggle-icon">🌙</span>
                    <span class="toggle-text">Dark Mode</span>
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card budget-card">
                <h3 class="card-title">Monthly Budget</h3>
                <div class="budget-input-group">
                    <input type="number" id="budgetInput" placeholder="Enter monthly budget" class="input-primary">
                    <button id="setBudget" class="btn btn-primary">Set Budget</button>
                </div>
                <div class="budget-display">
                    <div class="budget-item">
                        <span class="label">Total Budget</span>
                        <span class="value">₹<span id="budget">0</span></span>
                    </div>
                    <div id="remaining" class="budget-remaining"></div>
                </div>
            </div>

            <div class="card balance-card">
                <h3 class="card-title">Current Balance</h3>
                <div class="balance-amount" id="balance">₹0</div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>

            <div class="card summary-card">
                <div class="summary-item income-summary">
                    <div class="summary-icon">📈</div>
                    <div class="summary-content">
                        <h4>Total Income</h4>
                        <p id="income" class="summary-value">₹0</p>
                    </div>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item expense-summary">
                    <div class="summary-icon">📉</div>
                    <div class="summary-content">
                        <h4>Total Expense</h4>
                        <p id="expense" class="summary-value">₹0</p>
                    </div>
                </div>
            </div>

            <div class="card transaction-card">
                <h3 class="card-title">Add Transaction</h3>
                <form id="form" class="transaction-form">
                    <input type="text" id="text" placeholder="Description" class="input-primary" required>
                    <select id="category" class="select-primary" required>
                        <option value="">Select Category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Travel">✈️ Travel</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Salary">💰 Salary</option>
                        <option value="Bills">💡 Bills</option>
                        <option value="Entertainment">🎮 Entertainment</option>
                        <option value="Other">📦 Other</option>
                    </select>
                    <input type="number" id="amount" placeholder="Amount (+ income, - expense)" class="input-primary" required>
                    <button type="submit" class="btn btn-primary btn-block">Add Transaction</button>
                </form>
            </div>

            <div class="card search-card">
                <h3 class="card-title">Search Transactions</h3>
                <div class="search-input-group">
                    <input type="text" id="search" placeholder="Search by description or category..." class="input-search">
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <div class="card history-card">
                <h3 class="card-title">Transaction History</h3>
                <ul id="list" class="transaction-list"></ul>
            </div>

            <div class="card actions-card">
                <h3 class="card-title">Data Management</h3>
                <div class="action-buttons">
                    <button id="downloadCSV" class="btn btn-success">
                        <span class="btn-icon">📊</span> Download CSV Report
                    </button>
                    <button id="backupData" class="btn btn-info">
                        <span class="btn-icon">💾</span> Backup Data
                    </button>
                    <div class="file-upload-wrapper">
                        <label for="restoreFile" class="btn btn-warning">
                            <span class="btn-icon">📂</span> Restore Data
                        </label>
                        <input type="file" id="restoreFile" accept=".json" hidden>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <p>&copy; 2024 Expense Tracker Pro. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
