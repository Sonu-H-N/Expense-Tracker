<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta charset="UTF-8">
<title>Advanced Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <button id="toggleTheme">🌙 Dark Mode</button>

<h1>💰 Expense Tracker</h1>

<div class="balance-container">
<h2>Balance</h2>
<h3 id="balance">₹0</h3>
</div>
<h3>Monthly Expense Graph</h3>

<canvas id="monthlyChart"></canvas>

<div class="summary">

<div class="income">
<h4>Income</h4>
<p id="income">₹0</p>
</div>

<div class="expense">
<h4>Expense</h4>
<p id="expense">₹0</p>
</div>

</div>

<h3>Add Transaction</h3>

<form id="form">

<input type="text" id="text" placeholder="Enter description" required>

<select id="category">
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Salary">Salary</option>
</select>

<input type="number" id="amount" placeholder="Amount (+income, -expense)" required>

<button>Add Transaction</button>

</form>

<h3>History</h3>
<input type="text" id="search" placeholder="Search transaction...">


<ul id="list"></ul>
<button id="downloadCSV">Download Report</button>


</div>

<script src="script.js"></script>

</body>
</html>
