<div class="container">

<h1>💰 Expense Tracker</h1>

<button id="toggleTheme">🌙</button>

<div class="card">
<h2>Balance</h2>
<h3 id="balance">₹0</h3>
</div>

<div class="card summary">
<div>
<h4>Income</h4>
<p id="income">₹0</p>
</div>

<div>
<h4>Expense</h4>
<p id="expense">₹0</p>
</div>
</div>

<div class="card">
<h3>Add Transaction</h3>
<form id="form">
<input type="text" id="text" placeholder="Description" required>
<select id="category"></select>
<input type="number" id="amount" placeholder="Amount" required>
<button>Add</button>
</form>
</div>

<div class="card">
<h3>Search</h3>
<input type="text" id="search" placeholder="Search...">
</div>

<div class="card">
<h3>History</h3>
<ul id="list"></ul>
</div>

<div class="card">
<h3>Charts</h3>
<canvas id="expenseChart"></canvas>
<canvas id="monthlyChart"></canvas>
</div>

<button id="downloadCSV">Download Report</button>

</div>
