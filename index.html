<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">

    <!-- SEO -->
    <meta name="description" content="Track your income and expenses with a modern dashboard">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-content">
            <h1><span class="icon">💰</span> Expense Tracker Pro</h1>

            <button id="toggle" class="theme-toggle">
                <span class="toggle-icon">🌙</span>
                <span class="toggle-text">Dark Mode</span>
            </button>
        </div>
    </header>

    <!-- DASHBOARD -->
    <div class="dashboard-grid">

        <!-- BUDGET -->
        <div class="card budget-card">
            <h3 class="card-title">Monthly Budget</h3>

            <div class="budget-input-group">
                <input type="number" id="budgetInput" placeholder="Enter monthly budget" class="input-primary">
                <button id="setBudget" class="btn btn-primary">Set Budget</button>
            </div>

            <div class="budget-display">
                <div class="budget-item">
                    <span>Total Budget</span>
                    <span>₹<span id="budget">0</span></span>
                </div>
                <div id="remaining"></div>
            </div>
        </div>

        <!-- BALANCE -->
        <div class="card balance-card">
            <h3 class="card-title">Current Balance</h3>
            <div class="balance-amount" id="balance">₹0</div>

            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- SUMMARY -->
        <div class="card summary-card">
            <div class="summary-item">
                <h4>Income</h4>
                <p id="income">₹0</p>
            </div>

            <div class="summary-item">
                <h4>Expense</h4>
                <p id="expense">₹0</p>
            </div>
        </div>

        <!-- ADD TRANSACTION -->
        <div class="card transaction-card">
            <h3 class="card-title">Add Transaction</h3>

            <form id="form">
                <input type="text" id="text" placeholder="Description" required class="input-primary">

                <select id="category" required class="input-primary">
                    <option value="">Select Category</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Travel">✈️ Travel</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Salary">💰 Salary</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Entertainment">🎮 Entertainment</option>
                    <option value="Other">📦 Other</option>
                </select>

                <input type="number" id="amount" placeholder="Amount (+ income, - expense)" required class="input-primary">

                <button class="btn btn-primary btn-block">Add Transaction</button>
            </form>
        </div>

        <!-- SEARCH -->
        <div class="card search-card">
            <h3 class="card-title">Search</h3>
            <input type="text" id="search" placeholder="Search transactions..." class="input-primary">
        </div>

        <!-- HISTORY -->
        <div class="card history-card">
            <h3 class="card-title">Transaction History</h3>
            <ul id="list"></ul>
        </div>

        <!-- ACTIONS -->
        <div class="card actions-card">
            <h3 class="card-title">Data</h3>

            <button id="downloadCSV" class="btn btn-success">Download CSV</button>
            <button id="backupData" class="btn btn-info">Backup</button>

            <input type="file" id="restoreFile" hidden>
            <label for="restoreFile" class="btn btn-warning">Restore</label>
        </div>

    </div>

    <!-- FOOTER -->
    <footer class="app-footer">
        <p>© 2026 Expense Tracker Pro | Built by Sonu 🚀</p>
    </footer>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>

</body>
</html>
